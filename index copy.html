<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Điểm Rèn Luyện</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800;900&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f5ff;
  --A:#ff3d71;--A2:#ff8fab;--Al:#fff0f4;--Aa:rgba(255,61,113,.12);
  --B:#0096e6;--B2:#5ec8ff;--Bl:#e8f6ff;
  --C:#7c3aed;--C2:#b48bff;--Cl:#f3eeff;
  --D:#00c896;--D2:#4eefc4;--Dl:#e6fff9;
  --E:#ff8c00;--E2:#ffb84d;
  --text:#1a1d3a;--sub:#5a5f8a;--hint:#9095bb;
  --card:#ffffff;--card2:#fafbff;
  --border:#e2e6f8;--border2:#cdd3f0;
  --sb:env(safe-area-inset-bottom,0px)
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;
  -webkit-tap-highlight-color:transparent;overflow-x:hidden;padding-bottom:calc(76px + var(--sb))}
#bubbles-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
body::before{content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:
    radial-gradient(ellipse 55% 45% at 10% 10%,rgba(255,61,113,.08) 0%,transparent 55%),
    radial-gradient(ellipse 50% 40% at 92% 15%,rgba(0,150,230,.08) 0%,transparent 55%),
    radial-gradient(ellipse 50% 40% at 75% 85%,rgba(124,58,237,.07) 0%,transparent 55%),
    radial-gradient(ellipse 45% 40% at 5% 85%,rgba(0,200,150,.07) 0%,transparent 55%),
    var(--bg)}

/* HEADER */
.hdr{position:sticky;top:0;z-index:300;
  background:rgba(255,255,255,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1.5px solid var(--border);box-shadow:0 2px 20px rgba(100,110,200,.1)}
.hdr-top{display:flex;align-items:center;gap:9px;padding:12px 16px 8px}
.hdr-title{font-family:'Baloo 2',sans-serif;font-size:1.05rem;font-weight:900;color:var(--text);flex:1}
.hdr-title span{background:linear-gradient(90deg,var(--A),var(--C));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.btn-support{display:flex;align-items:center;gap:5px;padding:6px 12px;
  background:linear-gradient(135deg,#fff8e6,#fff0f4);border:1.5px solid #ffd07a;border-radius:20px;
  cursor:pointer;font-family:'Nunito',sans-serif;font-size:.68rem;font-weight:800;color:#c07000;
  letter-spacing:.02em;transition:all .2s;white-space:nowrap;flex-shrink:0;
  box-shadow:0 2px 10px rgba(255,184,0,.2)}
.btn-support:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(255,184,0,.3)}
.btn-support:active{transform:scale(.95)}
.btn-support .s-ico{font-size:.85rem;animation:hbeat 2s ease-in-out infinite}
@keyframes hbeat{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
.score-ring{position:relative;width:54px;height:54px;flex-shrink:0}
.score-ring svg{position:absolute;inset:0;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--border2);stroke-width:4.5}
.ring-fill{fill:none;stroke-width:4.5;stroke-linecap:round;transition:stroke-dashoffset .7s cubic-bezier(.4,0,.2,1),stroke .4s}
.score-inside{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1}
.score-n{font-family:'Baloo 2',sans-serif;font-size:1rem;font-weight:900;color:var(--text);transition:transform .25s cubic-bezier(.34,1.56,.64,1)}
.score-d{font-size:.44rem;font-weight:700;color:var(--hint)}
.rank-pill{padding:4px 11px;border-radius:20px;font-size:.6rem;font-weight:800;
  letter-spacing:.06em;text-transform:uppercase;border:1.5px solid;white-space:nowrap;flex-shrink:0;transition:all .3s}
.rk-to{background:#e6fff6;color:#00915e;border-color:#4eefc4}
.rk-kh{background:#e8f6ff;color:#0070b8;border-color:#5ec8ff}
.rk-tb{background:#fff0f4;color:#cc2255;border-color:#ff8fab}
.rk-ye{background:#f2f3f8;color:var(--sub);border-color:var(--border2)}

/* SEARCH */
.hdr-search{padding:0 16px 12px;position:relative}
.si-ico{position:absolute;left:28px;top:50%;transform:translateY(-50%);font-size:.82rem;pointer-events:none}
.search-box{width:100%;padding:10px 38px 10px 40px;border-radius:16px;
  border:1.5px solid var(--border2);background:#f5f7ff;
  font-family:'Nunito',sans-serif;font-size:.88rem;font-weight:600;color:var(--text);
  outline:none;-webkit-appearance:none;transition:all .2s}
.search-box::placeholder{color:var(--hint)}
.search-box:focus{border-color:var(--A);background:#fff5f8;box-shadow:0 0 0 3px rgba(255,61,113,.1)}
.sc{position:absolute;right:26px;top:50%;transform:translateY(-50%);
  background:var(--border);border:none;color:var(--sub);cursor:pointer;
  width:20px;height:20px;border-radius:50%;font-size:.65rem;display:none;align-items:center;justify-content:center}
.sc.on{display:flex}

/* SCORE BAR */
.sbar{background:rgba(255,255,255,.9);backdrop-filter:blur(12px);border-bottom:1.5px solid var(--border);display:flex;position:relative;z-index:1}
.sb-item{flex:1;padding:9px 6px 11px;text-align:center;position:relative;cursor:pointer;transition:background .15s}
.sb-item:active{background:#f5f7ff}
.sb-item+.sb-item{border-left:1px solid var(--border)}
.sb-letter{font-size:.56rem;font-weight:900;color:var(--hint);letter-spacing:.08em;text-transform:uppercase}
.sb-val{font-size:1.1rem;font-weight:900;line-height:1.1;font-family:'Baloo 2',sans-serif;transition:transform .2s cubic-bezier(.34,1.56,.64,1)}
.sb-max{font-size:.52rem;font-weight:700;color:var(--hint)}
.sb-strip{position:absolute;bottom:0;left:0;height:3px;border-radius:1.5px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.sb-item:nth-child(1) .sb-val{color:var(--A)} .sb-item:nth-child(1) .sb-strip{background:linear-gradient(90deg,var(--A),var(--A2))}
.sb-item:nth-child(2) .sb-val{color:var(--B)} .sb-item:nth-child(2) .sb-strip{background:linear-gradient(90deg,var(--B),var(--B2))}
.sb-item:nth-child(3) .sb-val{color:var(--C)} .sb-item:nth-child(3) .sb-strip{background:linear-gradient(90deg,var(--C),var(--C2))}
.sb-item:nth-child(4) .sb-val{color:var(--D)} .sb-item:nth-child(4) .sb-strip{background:linear-gradient(90deg,var(--D),var(--D2))}

/* MAIN */
.main{padding:14px 12px 8px;position:relative;z-index:1}
.search-info{font-size:.76rem;font-weight:700;color:var(--B);margin-bottom:10px;
  padding:8px 14px;background:var(--Bl);border:1.5px solid rgba(0,150,230,.25);border-radius:12px;display:none}
.search-info.on{display:block}
.no-r{text-align:center;padding:2.5rem;color:var(--hint);font-size:.88rem;font-weight:700;display:none}
.no-r.on{display:block}

/* SECTION */
.sec{background:var(--card);border-radius:22px;margin-bottom:12px;overflow:hidden;
  border:1.5px solid var(--border);box-shadow:0 4px 24px rgba(100,110,200,.13);
  animation:up .35s ease both;position:relative;z-index:1}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.sec:nth-child(1){animation-delay:.05s;border-top:4px solid var(--A)}
.sec:nth-child(2){animation-delay:.1s;border-top:4px solid var(--B)}
.sec:nth-child(3){animation-delay:.15s;border-top:4px solid var(--C)}
.sec:nth-child(4){animation-delay:.2s;border-top:4px solid var(--D)}
.sec.hide{display:none}
.sec-head{display:flex;align-items:center;gap:11px;padding:13px 15px;cursor:pointer;transition:background .12s}
.sec-head:active{background:#fafbff}
.sec-icon{width:40px;height:40px;border-radius:13px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.2rem}
.sec:nth-child(1) .sec-icon{background:linear-gradient(135deg,#ffb3c6,#ff3d71);box-shadow:0 4px 14px rgba(255,61,113,.3)}
.sec:nth-child(2) .sec-icon{background:linear-gradient(135deg,#a8e6ff,#0096e6);box-shadow:0 4px 14px rgba(0,150,230,.3)}
.sec:nth-child(3) .sec-icon{background:linear-gradient(135deg,#d9b8ff,#7c3aed);box-shadow:0 4px 14px rgba(124,58,237,.3)}
.sec:nth-child(4) .sec-icon{background:linear-gradient(135deg,#a0ffdf,#00c896);box-shadow:0 4px 14px rgba(0,200,150,.3)}
.sec-mid{flex:1;min-width:0}
.sec-title{font-family:'Baloo 2',sans-serif;font-size:.92rem;font-weight:800;line-height:1.3;color:var(--text)}
.sec-sub{font-size:.64rem;font-weight:600;color:var(--hint);margin-top:1px}
.sec-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
.sec-badge{padding:3px 11px;border-radius:20px;font-size:.7rem;font-weight:900;border:1.5px solid;transition:all .3s;font-family:'Baloo 2',sans-serif}
.sec-badge.part{background:#f2f3f8;color:var(--sub);border-color:var(--border2)}
.sec:nth-child(1) .sec-badge.full{background:var(--Al);color:var(--A);border-color:var(--A2)}
.sec:nth-child(2) .sec-badge.full{background:var(--Bl);color:var(--B);border-color:var(--B2)}
.sec:nth-child(3) .sec-badge.full{background:var(--Cl);color:var(--C);border-color:var(--C2)}
.sec:nth-child(4) .sec-badge.full{background:var(--Dl);color:var(--D);border-color:var(--D2)}
.cap-pill{font-size:.52rem;font-weight:900;background:linear-gradient(135deg,#ff8c00,#ffb84d);
  color:#fff;padding:2px 8px;border-radius:10px;animation:blink 2s ease-in-out infinite;white-space:nowrap}
@keyframes blink{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.chev{font-size:.5rem;color:var(--hint);transition:transform .22s;margin-left:2px;
  width:22px;height:22px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center}
.chev.o{transform:rotate(180deg)}
.sec-body{display:none}.sec-body.o{display:block}

/* GROUP */
.grp{border-top:1px solid var(--border);padding:11px 15px}
.grp.hide{display:none}
.grp-head{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:6px}
.grp-name{font-size:.64rem;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.07em;flex:1;line-height:1.4}
.grp-info{font-size:.64rem;font-weight:900;color:var(--hint);white-space:nowrap;flex-shrink:0;transition:color .3s;font-family:'Baloo 2',sans-serif}
.grp-info.c{color:var(--E)}
.prog{height:5px;background:var(--border);border-radius:3px;margin-bottom:9px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .45s cubic-bezier(.4,0,.2,1)}
.sec:nth-child(1) .prog-fill{background:linear-gradient(90deg,var(--A),var(--A2))}
.sec:nth-child(2) .prog-fill{background:linear-gradient(90deg,var(--B),var(--B2))}
.sec:nth-child(3) .prog-fill{background:linear-gradient(90deg,var(--C),var(--C2))}
.sec:nth-child(4) .prog-fill{background:linear-gradient(90deg,var(--D),var(--D2))}
.cap-msg{font-size:.62rem;font-weight:700;color:var(--E);margin-top:6px;display:none;
  padding:5px 10px;background:#fff8ee;border-radius:8px;border-left:2px solid var(--E2)}
.grp.capped .cap-msg{display:block}

/* ITEM */
.item{display:flex;align-items:flex-start;gap:11px;padding:8px 0;border-bottom:1px solid var(--border);transition:opacity .2s}
.item:last-child{border-bottom:none}
.item.hide{display:none}
.item.lk{opacity:.3;pointer-events:none}
.item.lk .btn{border-style:dashed!important}
.btn{width:34px;height:34px;flex-shrink:0;border-radius:50%;
  border:2px solid var(--border2);background:var(--card2);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:.72rem;font-weight:900;touch-action:manipulation;will-change:transform;color:var(--hint);transition:border-color .15s,background .15s}
.btn:active{transform:scale(.75)}
.btn.done{color:#fff;border-color:transparent}
.btn.pend{background:#fff8ee;border-color:var(--E2);color:var(--E)}
.sec:nth-child(1) .btn.done{background:linear-gradient(135deg,var(--A2),var(--A));box-shadow:0 3px 12px rgba(255,61,113,.35)}
.sec:nth-child(2) .btn.done{background:linear-gradient(135deg,var(--B2),var(--B));box-shadow:0 3px 12px rgba(0,150,230,.35)}
.sec:nth-child(3) .btn.done{background:linear-gradient(135deg,var(--C2),var(--C));box-shadow:0 3px 12px rgba(124,58,237,.35)}
.sec:nth-child(4) .btn.done{background:linear-gradient(135deg,var(--D2),var(--D));box-shadow:0 3px 12px rgba(0,200,150,.35)}
.btn.popping{animation:pop .24s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{0%{transform:scale(.4)}60%{transform:scale(1.25)}100%{transform:scale(1)}}
.item-body{flex:1;min-width:0}
.item-label{font-size:.83rem;font-weight:600;color:var(--text);line-height:1.55}
.hl{background:#fff3b0;border-radius:3px;padding:0 2px;border-bottom:2px solid #f5c400}
.pts{display:inline-flex;align-items:center;margin-top:4px;
  font-size:.58rem;font-weight:900;padding:2px 9px;border-radius:20px;color:#fff;font-family:'Baloo 2',sans-serif}
.sec:nth-child(1) .pts{background:linear-gradient(90deg,var(--A),var(--A2))}
.sec:nth-child(2) .pts{background:linear-gradient(90deg,var(--B),var(--B2))}
.sec:nth-child(3) .pts{background:linear-gradient(90deg,var(--C),var(--C2))}
.sec:nth-child(4) .pts{background:linear-gradient(90deg,var(--D),var(--D2))}

/* TABS */
.tabs{position:fixed;bottom:0;left:0;right:0;z-index:400;
  background:rgba(255,255,255,.93);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1.5px solid var(--border);display:grid;grid-template-columns:repeat(4,1fr);padding-bottom:var(--sb)}
.tab{display:flex;flex-direction:column;align-items:center;padding:9px 4px 7px;
  cursor:pointer;border:none;background:none;font-family:'Nunito',sans-serif;touch-action:manipulation;gap:2px}
.tab:active{opacity:.6}
.tab-ico{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;transition:transform .2s,background .2s,box-shadow .2s;background:var(--bg)}
.tab-lbl{font-size:.57rem;font-weight:800;color:var(--sub);letter-spacing:.01em}
.tab-score{font-size:.62rem;font-weight:900;transition:transform .2s cubic-bezier(.34,1.56,.64,1);font-family:'Baloo 2',sans-serif}
.tab:nth-child(1) .tab-score{color:var(--A)} .tab:nth-child(1) .tab-ico.act{background:var(--Al);box-shadow:0 3px 10px rgba(255,61,113,.2);transform:scale(1.12)}
.tab:nth-child(2) .tab-score{color:var(--B)} .tab:nth-child(2) .tab-ico.act{background:var(--Bl);box-shadow:0 3px 10px rgba(0,150,230,.2);transform:scale(1.12)}
.tab:nth-child(3) .tab-score{color:var(--C)} .tab:nth-child(3) .tab-ico.act{background:var(--Cl);box-shadow:0 3px 10px rgba(124,58,237,.2);transform:scale(1.12)}
.tab:nth-child(4) .tab-score{color:var(--D)} .tab:nth-child(4) .tab-ico.act{background:var(--Dl);box-shadow:0 3px 10px rgba(0,200,150,.2);transform:scale(1.12)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:999;background:rgba(20,22,50,.4);backdrop-filter:blur(8px);
  display:none;align-items:flex-end;justify-content:center}
.modal-overlay.on{display:flex;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:linear-gradient(160deg,#ffffff,#f5f7ff);border-radius:28px 28px 0 0;
  width:100%;max-width:480px;padding:0 0 calc(20px + var(--sb));
  border:1.5px solid var(--border);border-bottom:none;
  box-shadow:0 -8px 48px rgba(100,110,200,.2);animation:slideUp .3s cubic-bezier(.34,1.2,.64,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:14px auto 18px}
.modal-close{position:absolute;top:16px;right:16px;width:30px;height:30px;border-radius:50%;
  background:var(--bg);border:1px solid var(--border);color:var(--sub);font-size:.8rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
.modal-close:active{opacity:.6}
.modal-inner{padding:0 20px;position:relative}
.donate-header{text-align:center;margin-bottom:16px}
.donate-ico-wrap{display:inline-block;padding:14px;background:linear-gradient(135deg,#fff8e6,#fff0f4);
  border-radius:22px;border:2px solid #ffd07a;margin-bottom:10px;box-shadow:0 4px 16px rgba(255,184,0,.2)}
.donate-ico{font-size:2rem}
.donate-title{font-family:'Baloo 2',sans-serif;font-size:1.05rem;font-weight:900;color:var(--text);margin-bottom:6px}
.donate-desc{font-size:.78rem;font-weight:600;color:var(--sub);line-height:1.65;padding:0 8px}
.donate-desc strong{color:#c07000}
.bank-box{background:linear-gradient(135deg,#fff8e6,#fff3ea);border:2px solid #ffd07a;border-radius:18px;padding:14px 16px;margin:16px 0;position:relative;overflow:hidden}
.bank-box::before{content:'💳';position:absolute;right:12px;top:10px;font-size:2.5rem;opacity:.08}
.bank-name{font-size:.62rem;font-weight:900;color:#b06000;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.bank-num-row{display:flex;align-items:center;gap:10px}
.bank-num{font-family:'Baloo 2',sans-serif;font-size:1.5rem;font-weight:900;color:var(--text);letter-spacing:.06em;flex:1}
.copy-btn{display:flex;align-items:center;gap:5px;padding:8px 14px;
  background:linear-gradient(135deg,var(--E),#ffb030);border:none;border-radius:12px;
  font-family:'Nunito',sans-serif;font-size:.72rem;font-weight:900;color:#fff;cursor:pointer;
  box-shadow:0 4px 14px rgba(255,140,0,.3);transition:all .18s;white-space:nowrap;flex-shrink:0}
.copy-btn:active{transform:scale(.92)}
.copy-btn.copied{background:linear-gradient(135deg,var(--D),#00a87a);box-shadow:0 4px 14px rgba(0,200,150,.3)}
.bank-owner{font-size:.68rem;font-weight:700;color:var(--sub);margin-top:6px}
.qr-wrap{text-align:center;margin:14px 0;padding:16px;background:var(--bg);border:1.5px solid var(--border2);border-radius:16px}
.qr-label{font-size:.68rem;font-weight:800;color:var(--hint);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px}
.qr-img{width:180px;height:180px;border-radius:12px;object-fit:cover;border:3px solid #ffd07a;box-shadow:0 4px 16px rgba(255,184,0,.2)}
.qr-placeholder{width:180px;height:180px;border-radius:12px;background:linear-gradient(135deg,#fff8e6,#fff3ea);
  border:2px dashed #ffd07a;display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.qr-placeholder-ico{font-size:2rem;opacity:.4}
.qr-placeholder-txt{font-size:.65rem;font-weight:700;color:var(--hint)}
.contact-row{display:flex;align-items:center;gap:10px;margin-top:6px;
  padding:12px 14px;background:#eef5ff;border:1.5px solid #bdd8ff;border-radius:14px}
.contact-label{flex:1;font-size:.75rem;font-weight:700;color:var(--sub)}
.contact-label strong{color:var(--text);display:block;font-size:.82rem}
.fb-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;
  background:linear-gradient(135deg,#1877f2,#0a52c4);border:none;border-radius:12px;
  font-family:'Nunito',sans-serif;font-size:.75rem;font-weight:800;color:#fff;cursor:pointer;
  box-shadow:0 4px 14px rgba(24,119,242,.3);transition:all .18s;text-decoration:none;white-space:nowrap}
.fb-btn:active{transform:scale(.93)}

/* CONFETTI */
.cf{position:fixed;z-index:9999;border-radius:2px;pointer-events:none;animation:cf linear forwards}
@keyframes cf{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(105vh) rotate(540deg);opacity:0}}
</style>
</head>
<body>

<canvas id="bubbles-canvas"></canvas>

<header class="hdr">
  <div class="hdr-top">
    <div class="hdr-title">🎓 Điểm <span>Rèn Luyện</span></div>
    <button class="btn-support" onclick="openSupport()">
      <span class="s-ico">💛</span>Hỗ trợ
    </button>
    <div class="score-ring">
      <svg viewBox="0 0 54 54" width="54" height="54">
        <circle class="ring-bg" cx="27" cy="27" r="22"/>
        <circle class="ring-fill" id="ring-arc" cx="27" cy="27" r="22"
          stroke="#ff3d71" stroke-dasharray="138.2" stroke-dashoffset="138.2"/>
      </svg>

(function(){
  const cv=document.getElementById('bubbles-canvas');
  const cx=cv.getContext('2d');
  const colors=[
    'rgba(255,61,113,.14)','rgba(0,150,230,.13)','rgba(124,58,237,.12)',
    'rgba(0,200,150,.13)','rgba(255,140,0,.11)','rgba(94,200,255,.14)',
    'rgba(255,143,171,.15)','rgba(180,139,255,.13)'
  ];
  let W,H,bs=[];
  function rsz(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
  function mk(){return{
    x:Math.random()*W,y:H+50+Math.random()*180,
    r:16+Math.random()*40,
    vx:(Math.random()-.5)*.3,vy:-.28-Math.random()*.45,
    color:colors[~~(Math.random()*colors.length)],
    phase:Math.random()*Math.PI*2,
    spd:.01+Math.random()*.016,
    op:.5+Math.random()*.5
  };}
  function init(){rsz();bs=Array.from({length:20},mk);}
  function frame(){
    cx.clearRect(0,0,W,H);
    bs.forEach(b=>{
      b.phase+=b.spd;
      b.x+=b.vx+Math.sin(b.phase)*.45;
      b.y+=b.vy;
      if(b.y<-b.r-10)Object.assign(b,mk(),{y:H+b.r+10});
      cx.save();cx.globalAlpha=b.op;
      // body
      cx.beginPath();cx.arc(b.x,b.y,b.r,0,Math.PI*2);
      cx.fillStyle=b.color;cx.fill();
      // glossy shine
      const g=cx.createRadialGradient(b.x-b.r*.28,b.y-b.r*.32,b.r*.04,b.x-b.r*.05,b.y-b.r*.05,b.r);
      g.addColorStop(0,'rgba(255,255,255,.65)');
      g.addColorStop(.35,'rgba(255,255,255,.2)');
      g.addColorStop(1,'rgba(255,255,255,0)');
      cx.beginPath();cx.arc(b.x,b.y,b.r,0,Math.PI*2);cx.fillStyle=g;cx.fill();
      // ring
      cx.beginPath();cx.arc(b.x,b.y,b.r,0,Math.PI*2);
      cx.strokeStyle='rgba(255,255,255,.55)';cx.lineWidth=1.2;cx.stroke();
      cx.restore();
    });
    requestAnimationFrame(frame);
  }
  window.addEventListener('resize',rsz);
  init();frame();
})();

function saveState(){try{localStorage.setItem('drl_state',JSON.stringify(S));}catch(e){}}

let q='',prevT=-1;
const gR=(s,gi)=>s.groups[gi].items.reduce((a,it,ii)=>S[`${s.id}_${gi}_${ii}`]==='d'?a+it.p:a,0);
const gC=(s,gi)=>Math.min(gR(s,gi),s.groups[gi].max);
const sR=s=>s.groups.reduce((a,_,gi)=>a+gC(s,gi),0);
const sC=s=>Math.min(sR(s),s.max);
const total=()=>D.reduce((a,s)=>a+sC(s),0);
function rk(t){
  if(t>=90)return['Xuất sắc 🏆','rk-to'];if(t>=80)return['Tốt ⭐','rk-to'];
  if(t>=65)return['Khá 👍','rk-kh'];if(t>=50)return['Trung bình','rk-tb'];return['Yếu','rk-ye'];
}
const nm=s=>s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[đĐ]/g,'d');
const hit=(t,q)=>!q||nm(t).includes(nm(q));
const hl=(t,q)=>{if(!q)return t;return t.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'),'<span class="hl">$1</span>');};

function confetti(){
  const c=['#ff3d71','#0096e6','#7c3aed','#00c896','#ff8c00','#5ec8ff','#ff8fab','#b48bff'];
  for(let i=0;i<65;i++){
    const el=document.createElement('div');el.className='cf';
    el.style.cssText=`left:${Math.random()*100}vw;top:-10px;width:${5+Math.random()*8}px;height:${9+Math.random()*11}px;background:${c[~~(Math.random()*c.length)]};animation-duration:${1.4+Math.random()*2}s;animation-delay:${Math.random()*.8}s;transform:rotate(${Math.random()*360}deg);border-radius:${Math.random()>.5?'50%':'2px'}`;
    document.body.appendChild(el);el.addEventListener('animationend',()=>el.remove());
  }
}

function tick(k,btnEl){
  const cur=S[k];const next=cur==='n'?'d':cur==='d'?'p':'n';S[k]=next;
  btnEl.className='btn'+(next==='d'?' done':next==='p'?' pend':'');
  btnEl.textContent=next==='d'?'✓':next==='p'?'…':'';
  if(next==='d'){btnEl.classList.add('popping');btnEl.addEventListener('animationend',()=>btnEl.classList.remove('popping'),{once:true});}
  const[sid,gi_s]=k.split('_');const si=D.findIndex(s=>s.id===sid);
  const sec=D[si];const gi=+gi_s;
  const gr=gR(sec,gi),gc=Math.min(gr,sec.groups[gi].max),gAtCap=gr>=sec.groups[gi].max;
  const rawSum=sR(sec),secAtCap=rawSum>=sec.max;
  sec.groups.forEach((g,gii)=>{g.items.forEach((_,iii)=>{
    const ik=`${sid}_${gii}_${iii}`,ist=S[ik];
    const shouldLock=(gR(sec,gii)>=g.max||secAtCap)&&ist!=='d'&&ist!=='p';
    const itemEl=document.getElementById('item_'+ik);if(itemEl)itemEl.classList.toggle('lk',shouldLock);
  });});
  const grpEl=document.getElementById('grp_'+sid+'_'+gi);
  if(grpEl){
    const fill=grpEl.querySelector('.prog-fill');
    if(fill)fill.style.width=(sec.groups[gi].max?Math.round(gc/sec.groups[gi].max*100):0)+'%';
    const info=grpEl.querySelector('.grp-info');
    if(info){info.textContent=`${gc}/${sec.groups[gi].max}`+(gAtCap&&gr>sec.groups[gi].max?` (${gr})`:'');info.className='grp-info'+(gAtCap?' c':'');}
    grpEl.classList.toggle('capped',gAtCap);
  }
  const scv=sC(sec),over=sR(sec)>sec.max;
  const secEl=document.getElementById('sec_'+sid);
  const badge=secEl&&secEl.querySelector('.sec-badge');
  if(badge){badge.textContent=`${scv}/${sec.max}`;badge.className='sec-badge '+(scv===sec.max?'full':'part');}
  const capPill=secEl&&secEl.querySelector('.cap-pill');
  if(over&&!capPill&&secEl){const right=secEl.querySelector('.sec-right');if(right){const p=document.createElement('span');p.className='cap-pill';p.textContent='Giới hạn';right.insertBefore(p,right.querySelector('.chev'));}}
  else if(!over&&capPill){capPill.remove();}
  updateHeader();
  const sbItem=document.querySelector(`#sbar .sb-item:nth-child(${si+1})`);
  if(sbItem){sbItem.querySelector('.sb-val').textContent=scv;const strip=sbItem.querySelector('.sb-strip');if(strip)strip.style.width=Math.round(scv/sec.max*100)+'%';}
  const tabEl=document.querySelector(`#tabs .tab:nth-child(${si+1})`);
  if(tabEl){const ts=tabEl.querySelector('.tab-score');if(ts)ts.textContent=`${scv}/${sec.max}`;const ti=tabEl.querySelector('.tab-ico');if(ti)ti.className='tab-ico'+(scv===sec.max?' act':'');}
  saveState();
}

function updateHeader(){
  const t=total();const[rn,rc]=rk(t);const circ=138.2;

  arc.setAttribute('stroke',t>=90?'#00c896':t>=80?'#0096e6':t>=65?'#7c3aed':t>=50?'#ff8c00':'#ff3d71');
  if(t!==prevT){const el=document.getElementById('sn');el.textContent=t;el.style.transform='scale(1.4)';setTimeout(()=>el.style.transform='',220);if(t===100&&prevT!==100)confetti();prevT=t;}

}

function applySearch(){
  let hits=0;
  D.forEach(s=>{
    let shits=0;
    s.groups.forEach((g,gi)=>{
      let ghits=0;
      g.items.forEach((it,ii)=>{
        const k=`${s.id}_${gi}_${ii}`;const m=hit(it.l,q);if(m)ghits++;
        const el=document.getElementById('item_'+k);
        if(el){el.classList.toggle('hide',!!(q&&!m));const lbl=el.querySelector('.item-label');if(lbl)lbl.innerHTML=q?hl(it.l,q):it.l;}
      });
      shits+=ghits;hits+=ghits;
      const ge=document.getElementById(`grp_${s.id}_${gi}`);if(ge)ge.classList.toggle('hide',!!(q&&ghits===0));
    });
    const se=document.getElementById('sec_'+s.id);
    if(se){
      se.classList.toggle('hide',!!(q&&shits===0));
      if(q&&shits>0){open[s.id]=true;const body=se.querySelector('.sec-body');const chev=se.querySelector('.chev');if(body)body.className='sec-body o';if(chev)chev.className='chev o';}
    }
  });
  const si=document.getElementById('si-box'),nr=document.getElementById('no-r');
  if(q){si.className='search-info on';si.innerHTML=`🔍 "<strong>${q}</strong>" — <strong>${hits}</strong> kết quả`;nr.className='no-r'+(hits===0?' on':'');}
  else{si.className='search-info';nr.className='no-r';}
}

function initRender(){
  document.getElementById('sbar').innerHTML=D.map((s,i)=>{
    const sc=sC(s),pct=Math.round(sc/s.max*100);
    return `<div class="sb-item" onclick="goSec('${s.id}')">
      <div class="sb-letter">${s.id}</div><div class="sb-val">${sc}</div>
      <div class="sb-max">/ ${s.max}</div><div class="sb-strip" style="width:${pct}%"></div>
    </div>`;
  }).join('');
  document.getElementById('tabs').innerHTML=D.map(s=>{
    const sc=sC(s);
    return `<button class="tab" onclick="goSec('${s.id}')">
      <div class="tab-ico${sc===s.max?' act':''}">${s.ico}</div>
      <div class="tab-lbl">${s.short}</div><div class="tab-score">${sc}/${s.max}</div>
    </button>`;
  }).join('');
  document.getElementById('root').innerHTML=D.map(s=>{
    const sc=sC(s),raw=sR(s),atCap=raw>=s.max,over=raw>s.max,isOpen=open[s.id];
    const ghtml=s.groups.map((g,gi)=>{
      const gr=gR(s,gi),gc=Math.min(gr,g.max),gAt=gr>=g.max;
      const pct=g.max?Math.round(gc/g.max*100):0;
      const ihtml=g.items.map((it,ii)=>{
        const k=`${s.id}_${gi}_${ii}`,st=S[k];
        const lk=(gAt||atCap)&&st!=='d'&&st!=='p';
        return `<div class="item${lk?' lk':''}" id="item_${k}">
          <button class="btn${st==='d'?' done':st==='p'?' pend':''}" onclick="tick('${k}',this)">${st==='d'?'✓':st==='p'?'…':''}</button>
          <div class="item-body"><div class="item-label">${it.l}</div><span class="pts">+${it.p} điểm</span></div>
        </div>`;
      }).join('');
      return `<div class="grp${gAt?' capped':''}" id="grp_${s.id}_${gi}">
        <div class="grp-head"><span class="grp-name">${g.name}</span>
          <span class="grp-info${gAt?' c':''}">${gc}/${g.max}${gAt&&gr>g.max?` (${gr})`:''}</span></div>
        <div class="prog"><div class="prog-fill" style="width:${pct}%"></div></div>
        ${ihtml}<div class="cap-msg">✦ Đã đạt tối đa nhóm — mục còn lại bị khoá</div>
      </div>`;
    }).join('');
    return `<div class="sec" id="sec_${s.id}">
      <div class="sec-head" onclick="tog('${s.id}')">
        <div class="sec-icon">${s.ico}</div>
        <div class="sec-mid"><div class="sec-title">${s.title}</div><div class="sec-sub">${s.groups.length} nhóm · tối đa ${s.max} điểm</div></div>
        <div class="sec-right">
          <span class="sec-badge ${sc===s.max?'full':'part'}">${sc}/${s.max}</span>
          ${over?`<span class="cap-pill">Giới hạn</span>`:''}
          <span class="chev${isOpen?' o':''}">▼</span>
        </div>
      </div>
      <div class="sec-body${isOpen?' o':''}">${ghtml}</div>
    </div>`;
  }).join('');
  updateHeader();
}
initRender();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#D0021B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Điểm Rèn Luyện</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Lexend+Deca:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
:root{
  --R:#D0021B; --Rd:#A80015; --Rl:#FFF1F2; --Rm:#FFD6D9;
  --ink:#111; --ink2:#555; --ink3:#999;
  --surf:#F4F4F6; --card:#fff; --line:#EBEBEF; --line2:#D8D8DF;
  --grn:#16A34A; --grn-l:#F0FDF4;
  --amb:#D97706; --amb-l:#FFFBEB;
  --sb:env(safe-area-inset-bottom,0px);
  --st:env(safe-area-inset-top,0px);
}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
  background:var(--surf); color:var(--ink);
  min-height:100dvh; overflow-x:hidden;
  -webkit-tap-highlight-color:transparent;
  padding-bottom:calc(74px + var(--sb));
  padding-top:var(--st);
}

/* ── HEADER ── */
.hdr{position:sticky;top:0;z-index:200;background:var(--R);box-shadow:0 2px 20px rgba(208,2,27,.3)}
.hdr-row{display:flex;align-items:center;gap:8px;padding:12px 16px 8px}
.hdr-title{
  flex:1; font-family:'Lexend Deca',sans-serif;
  font-size:16px; font-weight:800; color:#fff; letter-spacing:-.2px;
}
.hdr-title small{font-size:14px;font-weight:500;opacity:.75}

/* ring */
.hring{position:relative;width:46px;height:46px;flex-shrink:0}
.hring svg{position:absolute;inset:0;transform:rotate(-90deg)}
.hr-bg{fill:none;stroke:rgba(255,255,255,.2);stroke-width:3.5}
.hr-fill{fill:none;stroke:#fff;stroke-width:3.5;stroke-linecap:round;
  transition:stroke-dashoffset .7s cubic-bezier(.4,0,.2,1)}
.hring-txt{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  line-height:1;
}
.hn{font-family:'Lexend Deca',sans-serif;font-size:14px;font-weight:800;color:#fff;
  transition:transform .22s cubic-bezier(.34,1.56,.64,1)}
.hd{font-size:8.5px;font-weight:500;color:rgba(255,255,255,.55);margin-top:1px}

/* rank chip */
.rk{
  font-family:'Lexend Deca',sans-serif;
  font-size:9.5px;font-weight:700;letter-spacing:.03em;
  padding:4px 9px;border-radius:20px;
  border:1.5px solid rgba(255,255,255,.4);
  color:#fff;background:rgba(255,255,255,.16);
  white-space:nowrap;flex-shrink:0;transition:all .3s;
}
/* support */
.sup-btn{
  display:flex;align-items:center;gap:4px;
  background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.35);
  border-radius:20px;padding:5px 11px;cursor:pointer;
  font-family:'Inter',sans-serif;font-size:11.5px;font-weight:700;color:#fff;
  flex-shrink:0;transition:background .15s;
}
.sup-btn:active{background:rgba(255,255,255,.28);transform:scale(.95)}
.sup-ico{animation:hb 2.2s ease-in-out infinite}
@keyframes hb{0%,100%{transform:scale(1)}45%{transform:scale(1.35)}}

/* search */
.hdr-search{padding:0 16px 11px;position:relative}
.sq{
  width:100%;height:40px;padding:0 36px 0 38px;
  background:#fff;border:none;border-radius:10px;
  font-family:'Inter',sans-serif;font-size:14px;font-weight:500;color:var(--ink);
  outline:none;-webkit-appearance:none;
}
.sq::placeholder{color:var(--ink3)}
.sq-ico{position:absolute;left:26px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none}
.sq-x{
  position:absolute;right:26px;top:50%;transform:translateY(-50%);
  width:18px;height:18px;border-radius:50%;
  background:var(--line2);border:none;color:var(--ink2);font-size:9px;
  cursor:pointer;display:none;align-items:center;justify-content:center;
}
.sq-x.on{display:flex}

/* ── SCORE BAR ── */
.sbar{display:flex;background:#fff;border-bottom:1px solid var(--line);position:relative;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.sbi{flex:1;display:flex;flex-direction:column;align-items:center;padding:9px 4px 11px;cursor:pointer;position:relative;-webkit-tap-highlight-color:transparent;transition:background .1s}
.sbi:active{background:var(--Rl)}
.sbi+.sbi{border-left:1px solid var(--line)}
.sbi-l{font-size:8.5px;font-weight:700;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px}
.sbi-v{font-family:'Lexend Deca',sans-serif;font-size:22px;font-weight:800;color:var(--R);line-height:1;transition:transform .18s cubic-bezier(.34,1.56,.64,1)}
.sbi-m{font-size:9px;font-weight:500;color:var(--ink3);margin-top:1px}
.sbi-bar{position:absolute;bottom:0;left:0;height:2.5px;background:var(--R);border-radius:0 2px 0 0;transition:width .55s cubic-bezier(.4,0,.2,1)}

/* ── MAIN ── */
.main{padding:12px 12px 0}
.sinfo{display:none;margin-bottom:10px;padding:9px 12px;background:var(--Rl);border-left:3px solid var(--R);border-radius:10px;font-size:13px;font-weight:600;color:var(--R)}
.sinfo.on{display:block}
.no-r{display:none;text-align:center;padding:40px 24px;color:var(--ink3);font-size:14px;font-weight:500}
.no-r.on{display:block}

/* ── SUMMARY CARD ── */
.sum-card{
  background:var(--R);border-radius:18px;padding:16px;margin-bottom:12px;
  display:flex;gap:14px;align-items:center;
  box-shadow:0 6px 20px rgba(208,2,27,.28);
  animation:fu .32s ease both;
}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.sring{position:relative;width:74px;height:74px;flex-shrink:0}
.sring svg{position:absolute;inset:0;transform:rotate(-90deg)}
.sr-bg{fill:none;stroke:rgba(255,255,255,.18);stroke-width:5}
.sr-f{fill:none;stroke:#fff;stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset .8s cubic-bezier(.4,0,.2,1)}
.sr-txt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1}
.sr-n{font-family:'Lexend Deca',sans-serif;font-size:21px;font-weight:800;color:#fff}
.sr-d{font-size:9.5px;font-weight:500;color:rgba(255,255,255,.6);margin-top:2px}
.sinfo-box{flex:1;min-width:0}
.srank{font-family:'Lexend Deca',sans-serif;font-size:16px;font-weight:800;color:#fff;margin-bottom:2px}
.smsg{font-size:11.5px;font-weight:500;color:rgba(255,255,255,.7);margin-bottom:10px}
.sbars{display:flex;flex-direction:column;gap:5px}
.sb-row{display:flex;align-items:center;gap:6px}
.sb-l{font-size:9.5px;font-weight:600;color:rgba(255,255,255,.7);width:44px;text-align:right;flex-shrink:0}
.sb-t{flex:1;height:3.5px;background:rgba(255,255,255,.18);border-radius:2px;overflow:hidden}
.sb-f{height:100%;background:#fff;border-radius:2px;transition:width .7s cubic-bezier(.4,0,.2,1)}
.sb-n{font-family:'Lexend Deca',sans-serif;font-size:9.5px;font-weight:700;color:#fff;width:18px}

/* ── SECTION ── */
.sec{
  background:var(--card);border-radius:18px;border:1px solid var(--line);
  margin-bottom:10px;overflow:hidden;
  box-shadow:0 1px 6px rgba(0,0,0,.07);
  animation:fu .35s ease both;
}
.sec:nth-child(1){animation-delay:.04s;border-top:3px solid #D0021B}
.sec:nth-child(2){animation-delay:.09s;border-top:3px solid #B80018}
.sec:nth-child(3){animation-delay:.14s;border-top:3px solid #A20016}
.sec:nth-child(4){animation-delay:.19s;border-top:3px solid #8E0014}
.sec.hide{display:none}

.sec-hd{display:flex;align-items:center;gap:12px;padding:13px 14px;cursor:pointer;transition:background .1s;-webkit-tap-highlight-color:transparent}
.sec-hd:active{background:var(--Rl)}
.sec-ico{width:40px;height:40px;border-radius:12px;background:var(--Rl);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.sec-mid{flex:1;min-width:0}
.sec-nm{font-family:'Lexend Deca',sans-serif;font-size:14px;font-weight:700;color:var(--ink);line-height:1.3}
.sec-mt{font-size:11px;font-weight:500;color:var(--ink3);margin-top:2px}
.sec-rt{display:flex;align-items:center;gap:6px;flex-shrink:0}
.sec-bdg{
  font-family:'Lexend Deca',sans-serif;font-size:11.5px;font-weight:700;
  padding:3px 9px;border-radius:20px;
  border:1.5px solid var(--line2);color:var(--ink3);background:var(--surf);
  transition:all .22s;
}
.sec-bdg.full{background:var(--Rl);color:var(--R);border-color:var(--Rm)}
.cap-pill{font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--amb-l);color:var(--amb);border:1px solid #FDE68A;white-space:nowrap}
.chev{
  width:26px;height:26px;border-radius:50%;border:1px solid var(--line);
  background:var(--surf);display:flex;align-items:center;justify-content:center;
  font-size:9px;color:var(--ink3);flex-shrink:0;transition:transform .22s ease;
}
.chev.o{transform:rotate(180deg)}
.sec-body{display:none}.sec-body.o{display:block}

/* ── GROUP ── */
.grp{padding:12px 14px;border-top:1px solid var(--line)}
.grp.hide{display:none}
.grp-hd{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:6px}
.grp-nm{font-size:10.5px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.07em;flex:1;line-height:1.4}
.grp-ct{font-family:'Lexend Deca',sans-serif;font-size:11px;font-weight:700;color:var(--ink3);flex-shrink:0;transition:color .2s}
.grp-ct.full{color:var(--grn)}
.prog{height:4px;background:var(--line);border-radius:2px;margin-bottom:10px;overflow:hidden}
.prog-f{height:100%;background:var(--R);border-radius:2px;transition:width .45s cubic-bezier(.4,0,.2,1)}
.cap-msg{margin-top:6px;font-size:11.5px;font-weight:600;color:var(--grn);padding:7px 10px;background:var(--grn-l);border-radius:8px;display:none}
.grp.capped .cap-msg{display:block}

/* ── ITEM ── */
.item{display:flex;align-items:flex-start;gap:11px;padding:8px 0;border-bottom:1px solid var(--line);transition:opacity .18s,background .1s;cursor:pointer;border-radius:8px;margin:0 -6px;padding-left:6px;padding-right:6px;-webkit-tap-highlight-color:transparent}
.item:last-child{border-bottom:none}
.item:active:not(.lk){background:var(--Rl)}
.item.hide{display:none}
.item.lk{opacity:.28;pointer-events:none}
.item.lk .cbtn{border-style:dashed!important}
.cbtn{
  width:34px;height:34px;flex-shrink:0;border-radius:50%;
  border:2px solid var(--line2);background:var(--surf);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;color:var(--ink3);
  touch-action:manipulation;transition:all .12s;pointer-events:none;
}
.cbtn.done{background:var(--R);border-color:var(--R);color:#fff;box-shadow:0 2px 10px rgba(208,2,27,.35)}
.cbtn.pend{background:var(--amb-l);border-color:#FCD34D;color:var(--amb)}
.cbtn.pop{animation:pop .25s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{0%{transform:scale(.3)}65%{transform:scale(1.3)}100%{transform:scale(1)}}
.ibody{flex:1;min-width:0}
.ilbl{font-size:14px;font-weight:500;color:var(--ink);line-height:1.55}
.hl{background:#FEF08A;border-radius:2px;padding:0 1px}
.pts{
  display:inline-flex;margin-top:5px;
  font-family:'Lexend Deca',sans-serif;font-size:10px;font-weight:700;
  padding:2px 8px;border-radius:20px;background:var(--Rl);color:var(--R);
}
.pb{
  display:inline-flex;margin-left:5px;margin-top:5px;vertical-align:middle;
  font-size:10px;font-weight:600;color:var(--amb);
  background:var(--amb-l);padding:2px 7px;border-radius:20px;
}

/* ── TABS ── */
.tabs{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:#fff;border-top:1px solid var(--line);
  display:grid;grid-template-columns:repeat(4,1fr);
  padding-bottom:var(--sb);
  box-shadow:0 -2px 12px rgba(0,0,0,.07);
}
.tab{
  display:flex;flex-direction:column;align-items:center;
  padding:8px 4px 7px;gap:2px;border:none;background:none;
  cursor:pointer;font-family:'Inter',sans-serif;
  -webkit-tap-highlight-color:transparent;transition:background .1s;position:relative;
}
.tab:active{background:var(--Rl)}
.tab::before{
  content:'';position:absolute;top:0;left:25%;width:50%;height:2.5px;
  background:var(--R);border-radius:0 0 3px 3px;
  transform:scaleX(0);transition:transform .22s cubic-bezier(.4,0,.2,1);
}
.tab.on::before{transform:scaleX(1)}
.ti{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;transition:background .18s}
.tab.on .ti{background:var(--Rl)}
.tl{font-size:9.5px;font-weight:600;color:var(--ink3)}
.tab.on .tl{color:var(--R);font-weight:700}
.ts{font-family:'Lexend Deca',sans-serif;font-size:9.5px;font-weight:700;color:var(--R)}

/* ── SHEET (modal) ── */
.overlay{position:fixed;inset:0;z-index:900;background:rgba(0,0,0,.42);display:none;align-items:flex-end;justify-content:center}
.overlay.on{display:flex;animation:fi .2s ease}
@keyframes fi{from{opacity:0}to{opacity:1}}
.sheet{
  background:#fff;border-radius:22px 22px 0 0;
  width:100%;max-width:480px;
  padding:0 0 calc(18px + var(--sb));
  box-shadow:0 -6px 32px rgba(0,0,0,.14);
  animation:su .3s cubic-bezier(.34,1.1,.64,1);
}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sh-handle{width:32px;height:4px;background:var(--line2);border-radius:2px;margin:12px auto 16px}
.sh-inner{padding:0 20px;position:relative}
.sh-x{
  position:absolute;top:0;right:0;width:28px;height:28px;border-radius:50%;
  background:var(--surf);border:1px solid var(--line);color:var(--ink2);
  font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.sh-x:active{background:var(--Rl)}
.don-hd{text-align:center;margin-bottom:14px}
.don-ico{width:56px;height:56px;border-radius:16px;background:var(--Rl);margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:26px}
.don-t{font-family:'Lexend Deca',sans-serif;font-size:18px;font-weight:800;color:var(--ink);margin-bottom:6px}
.don-d{font-size:13px;font-weight:500;color:var(--ink2);line-height:1.65}
.don-d strong{color:var(--R)}
.bnk{background:var(--Rl);border:1.5px solid var(--Rm);border-radius:14px;padding:13px;margin:14px 0}
.bnk-l{font-size:9.5px;font-weight:700;color:var(--R);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
.bnk-row{display:flex;align-items:center;gap:10px}
.bnk-n{font-family:'Lexend Deca',sans-serif;font-size:22px;font-weight:800;color:var(--ink);flex:1;letter-spacing:.04em}
.cp-btn{
  padding:8px 14px;border-radius:10px;border:none;
  background:var(--R);color:#fff;
  font-family:'Inter',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;box-shadow:0 3px 10px rgba(208,2,27,.3);flex-shrink:0;
  transition:all .14s;
}
.cp-btn:active{transform:scale(.92)}
.cp-btn.ok{background:var(--grn)}
.bnk-own{font-size:11.5px;font-weight:500;color:var(--ink3);margin-top:6px}
.qr-box{text-align:center;padding:14px;background:var(--surf);border:1px solid var(--line);border-radius:14px;margin-bottom:12px}
.qr-lbl{font-size:9.5px;font-weight:700;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.qr-img{width:160px;height:160px;border-radius:10px;border:2px solid var(--Rm)}
.qr-ph{width:160px;height:160px;border-radius:10px;background:#fff;border:1.5px dashed var(--Rm);display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.qr-ph span{font-size:11px;font-weight:500;color:var(--ink3)}
.fb-row{display:flex;align-items:center;gap:10px;padding:11px 13px;background:#EBF5FF;border:1px solid #BFDBFE;border-radius:12px}
.fb-info{flex:1;font-size:12.5px;font-weight:600;color:var(--ink2)}
.fb-info strong{display:block;color:var(--ink);font-size:13.5px;margin-bottom:1px}
.fb-btn{display:flex;align-items:center;gap:5px;padding:8px 13px;border-radius:10px;border:none;background:#1877F2;color:#fff;font-family:'Inter',sans-serif;font-size:12px;font-weight:700;text-decoration:none;box-shadow:0 3px 10px rgba(24,119,242,.3);transition:all .14s}
.fb-btn:active{transform:scale(.92)}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:calc(82px + var(--sb));left:50%;
  transform:translateX(-50%) translateY(5px);
  background:#111;color:#fff;font-size:13px;font-weight:600;
  padding:8px 18px;border-radius:22px;white-space:nowrap;z-index:9000;
  opacity:0;transition:opacity .17s,transform .17s;pointer-events:none;
  box-shadow:0 4px 18px rgba(0,0,0,.22);
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── CONFETTI ── */
.cf{position:fixed;z-index:9999;pointer-events:none;border-radius:2px;animation:cf linear forwards}
@keyframes cf{from{opacity:1;transform:translateY(-10px) rotate(0)}to{opacity:0;transform:translateY(105vh) rotate(540deg)}}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-row">
    <div class="hdr-title">🎓 Điểm <small>Rèn Luyện</small></div>
    <button class="sup-btn" onclick="openSup()"><span class="sup-ico">💛</span>Hỗ trợ</button>
    <div class="hring">
      <svg viewBox="0 0 46 46" width="46" height="46">
        <circle class="hr-bg" cx="23" cy="23" r="19"/>
        <circle class="hr-fill" id="hring" cx="23" cy="23" r="19" stroke-dasharray="119.4" stroke-dashoffset="119.4"/>
      </svg>
      <div class="hring-txt"><div class="hn" id="sn">0</div><div class="hd">/100</div></div>
    </div>
    <div class="rk" id="rp">Yếu</div>
  </div>
  <div class="hdr-search">
    <span class="sq-ico">🔍</span>
    <input class="sq" id="sq" type="search" autocomplete="off" placeholder="Tìm hoạt động...">
    <button class="sq-x" id="sq-x" onclick="clrQ()">✕</button>
  </div>
</header>

<div class="sbar" id="sbar"></div>

<main class="main">
  <div class="sinfo" id="sinfo"></div>
  <div class="sum-card" id="sum-card">
    <div class="sring">
      <svg viewBox="0 0 74 74" width="74" height="74">
        <circle class="sr-bg" cx="37" cy="37" r="31"/>
        <circle class="sr-f" id="srg" cx="37" cy="37" r="31" stroke-dasharray="194.8" stroke-dashoffset="194.8"/>
      </svg>
      <div class="sr-txt"><div class="sr-n" id="sum-n">0</div><div class="sr-d">/100</div></div>
    </div>
    <div class="sinfo-box">
      <div class="srank" id="sum-rank">Yếu</div>
      <div class="smsg" id="sum-msg">Bắt đầu điền điểm nhé!</div>
      <div class="sbars" id="sbars"></div>
    </div>
  </div>
  <div id="root"></div>
  <div class="no-r" id="no-r">😕 Không tìm thấy kết quả.</div>
</main>

<nav class="tabs" id="tabs"></nav>
<div class="toast" id="toast"></div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeSup()">
  <div class="sheet">
    <div class="sh-inner">
      <div class="sh-handle"></div>
      <button class="sh-x" onclick="closeSup()">✕</button>
      <div class="don-hd">
        <div class="don-ico">☕</div>
        <div class="don-t">Ủng hộ Admin</div>
        <div class="don-d">Nếu app hữu ích, hãy <strong>mời admin một ly cà phê</strong> để tiếp tục cải thiện nhé! 💪</div>
      </div>
      <div class="bnk">
        <div class="bnk-l">💳 MBBank</div>
        <div class="bnk-row">
          <div class="bnk-n">0398 742 380</div>

<script>
const D=[
  {id:'A',title:'Học tập',ico:'📚',short:'Học tập',max:30,groups:[
    {name:'Kết quả học tập',max:24,items:[

    {name:'Trình độ ngoại ngữ',max:6,items:[
      {l:'Đạt trình độ ngoại ngữ theo tiến độ chương trình đào tạo',p:4},

    ]},
    {name:'Hoạt động học thuật',max:9,items:[

      {l:'Công bố khoa học tại Hội nghị hoặc tạp chí KH chuyên ngành',p:6},
      {l:'Thành viên CLB học thuật, Lab nghiên cứu, nhóm Khởi nghiệp',p:6},
      {l:'Tham gia cuộc thi Olympic cấp Đại học, quốc gia, quốc tế',p:6},
      {l:'Tham gia khóa đào tạo kỹ năng nghề nghiệp, bổ trợ chuyên môn',p:6}
    ]},
    {name:'Kế hoạch học tập',max:6,items:[
      {l:'Có kế hoạch học tập và rèn luyện phù hợp được thầy cô ghi nhận',p:6}
    ]}
  ]},
  {id:'B',title:'Kỷ luật',ico:'📋',short:'Kỷ luật',max:25,groups:[
    {name:'Hoạt động bắt buộc',max:20,items:[
      {l:'Tham gia Sinh hoạt công dân do nhà trường tổ chức',p:7},
      {l:'Tham gia Họp lớp thường kỳ do Trường/Viện/Khoa tổ chức',p:7},
      {l:'Nắm vững quy định và quy chế của Nhà trường',p:6}
    ]},
    {name:'Hoạt động bổ trợ',max:9,items:[
      {l:'Thực tập tăng cường năng lực nghề nghiệp tại doanh nghiệp',p:6},
      {l:'Hội thảo kỹ năng mềm, phương pháp học tập',p:3},
      {l:'Buổi nói chuyện thời sự, phòng chống tội phạm tệ nạn xã hội',p:3},
      {l:'Hoạt động hướng nghiệp, tìm kiếm thông tin việc làm',p:3},
      {l:'Khóa đào tạo kỹ năng mềm',p:6}
    ]},
    {name:'Ý thức kỷ luật học tập',max:9,items:[
      {l:'Không bị cấm thi tất cả các học phần trong kỳ',p:6},
      {l:'Tự học tại thư viện / trực tuyến tối thiểu 160 giờ/kỳ',p:6}
    ]}
  ]},
  {id:'C',title:'Văn hóa & XH',ico:'🏅',short:'Văn hóa',max:25,groups:[
    {name:'Phong trào văn hóa',max:10,items:[
      {l:'Thi biểu diễn văn nghệ (hát, múa, nhảy, đàn, vẽ tranh...)',p:6},
      {l:'Giải thể thao chính thức (bóng đá, cờ vua, bóng chuyền...)',p:6},
      {l:'Tìm hiểu bản sắc văn hóa dân tộc, địa phương, trường học',p:3},
      {l:'Thể dục nâng cao sức khỏe do đơn vị hợp pháp tổ chức',p:4},
      {l:'Cổ vũ các hoạt động văn hóa, thể thao',p:3},
      {l:'Thành viên CLB/Đội văn nghệ, thể thao, tình nguyện, sở thích',p:6}
    ]},
    {name:'Hoạt động chính trị – xã hội',max:12,items:[
      {l:'Tình nguyện (mùa hè xanh, tại chỗ, cổng trường ATGT)',p:3},
      {l:'Phong trào "cốc trà đá vì cộng đồng", tuổi trẻ Bách khoa Nhân ái',p:3},
      {l:'Hiến máu nhân đạo do Trường và tổ chức hợp pháp phát động',p:6},
      {l:'Diễn đàn sinh viên, toạ đàm với lãnh đạo Đại học / Khoa',p:3},
      {l:'Hành động tích cực trên không gian mạng được ghi nhận',p:3},
      {l:'Đội tình nguyện: mùa hè xanh, mùa đông, tiếp sức mùa thi',p:6},
      {l:'Khảo sát thông tin do Đại học thực hiện',p:3},
      {l:'Sự kiện chính trị – xã hội (Đại hội, Hội nghị, Đảng–Đoàn–Hội...)',p:3}
    ]},
    {name:'Công tác cán bộ lớp, Đoàn – Hội',max:6,items:[
      {l:'Cán bộ Lớp/Đoàn-Hội/Chi bộ — hoàn thành xuất sắc nhiệm vụ',p:6},
      {l:'Cán bộ Lớp/Đoàn-Hội/Chi bộ — hoàn thành tốt nhiệm vụ',p:4},
      {l:'Cán bộ Lớp/Đoàn-Hội/Chi bộ — hoàn thành nhiệm vụ',p:2}
    ]}
  ]},
  {id:'D',title:'Công dân',ico:'🤝',short:'Công dân',max:20,groups:[
    {name:'Trách nhiệm công dân',max:16,items:[
      {l:'Hiểu biết và chấp hành pháp luật, quy định trường và nơi cư trú',p:8},
      {l:'Tuyên truyền chủ trương Đảng, chính sách pháp luật Nhà nước',p:4},
      {l:'Khai báo thông tin liên lạc và nơi cư trú theo yêu cầu',p:4},
      {l:'Giữ gìn an ninh, bảo vệ cảnh quan môi trường, nếp sống văn minh',p:4}
    ]},
    {name:'Thành tích học tập và rèn luyện',max:4,items:[
      {l:'Giấy khen / bằng khen của Đoàn, Hội, Nhà trường hoặc địa phương',p:4},
      {l:'Đạt loại Khá trở lên — Lớp bồi dưỡng nhận thức về Đảng',p:4},
      {l:'Đối tượng Đảng được kết nạp hoặc Đảng viên dự bị chuyển chính thức',p:4},
      {l:'Danh hiệu Sinh viên năm tốt từ cấp Trường trở lên',p:4},
      {l:'Bằng khen, huy chương tương đương cấp Bộ trở lên',p:4},
      {l:'Đạt giải thi chính thức cấp Trường, Thành phố, Quốc gia, Quốc tế',p:4}
    ]}
  ]}
];

const S={};
D.forEach(s=>s.groups.forEach((g,gi)=>g.items.forEach((_,ii)=>{S[`${s.id}_${gi}_${ii}`]='n'})));
try{const sv=JSON.parse(localStorage.getItem('drl_v4')||'{}');Object.keys(sv).forEach(k=>{if(k in S)S[k]=sv[k];});}catch(e){}
const open={A:false,B:false,C:false,D:false};
let q='',prevT=-1;
const save=()=>{try{localStorage.setItem('drl_v4',JSON.stringify(S));}catch(e){}};
const gR=(s,gi)=>s.groups[gi].items.reduce((a,it,ii)=>S[`${s.id}_${gi}_${ii}`]==='d'?a+it.p:a,0);
const gC=(s,gi)=>Math.min(gR(s,gi),s.groups[gi].max);
const sR=s=>s.groups.reduce((a,_,gi)=>a+gC(s,gi),0);
const sC=s=>Math.min(sR(s),s.max);
const total=()=>D.reduce((a,s)=>a+sC(s),0);
const rkOf=t=>t>=90?'Xuất sắc 🏆':t>=80?'Tốt ⭐':t>=65?'Khá 👍':t>=50?'Trung bình':'Yếu';
const msgOf=t=>['Hãy bắt đầu điền thông tin!','Đang tiến bộ — cố lên! 🔥','Khá tốt, tiếp tục nhé! 💪','Sắp đạt mục tiêu rồi! 🚀','Hoàn hảo! Giữ vững thành tích! 🏆'][t>=90?4:t>=70?3:t>=50?2:t>=25?1:0];
const nm=s=>s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[đĐ]/g,'d');
const hit=(t,q)=>!q||nm(t).includes(nm(q));
const hl=(t,q)=>q?t.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'),'<span class="hl">$1</span>'):t;

let _tt;
const toast=m=>{const e=document.getElementById('toast');e.textContent=m;e.classList.add('on');clearTimeout(_tt);_tt=setTimeout(()=>e.classList.remove('on'),2000)};

function confetti(){
  const c=['#D0021B','#ff6070','#FFD6D9','#fff','#FCA5A5'];
  for(let i=0;i<60;i++){
    const el=document.createElement('div');el.className='cf';
    el.style.cssText=`left:${Math.random()*100}vw;top:-8px;width:${5+Math.random()*7}px;height:${8+Math.random()*12}px;background:${c[~~(Math.random()*c.length)]};animation-duration:${1.5+Math.random()*1.8}s;animation-delay:${Math.random()*.7}s;transform:rotate(${Math.random()*360}deg);border-radius:${Math.random()>.5?'50%':'2px'}`;
    document.body.appendChild(el);el.addEventListener('animationend',()=>el.remove());
  }
}

function updHdr(){
  const t=total(),c=119.4;
  document.getElementById('hring').style.strokeDashoffset=c-(c*t/100);
  if(t!==prevT){
    const e=document.getElementById('sn');e.textContent=t;
    e.style.transform='scale(1.5)';setTimeout(()=>e.style.transform='',230);
    if(t===100&&prevT!==100)confetti();
    prevT=t;
  }
  document.getElementById('rp').textContent=rkOf(t);
  const sc=194.8;
  document.getElementById('srg').style.strokeDashoffset=sc-(sc*t/100);
  document.getElementById('sum-n').textContent=t;
  document.getElementById('sum-rank').textContent=rkOf(t);
  document.getElementById('sum-msg').textContent=msgOf(t);
  document.getElementById('sbars').innerHTML=D.map(s=>{
    const v=sC(s),p=Math.round(v/s.max*100);
    return `<div class="sb-row"><div class="sb-l">${s.short}</div><div class="sb-t"><div class="sb-f" style="width:${p}%"></div></div><div class="sb-n">${v}</div></div>`;
  }).join('');
}

function tickRow(k){
  if(document.getElementById('item_'+k)?.classList.contains('lk'))return;
  const btn=document.getElementById('cbtn_'+k);
  tick(k,btn);
}

function tick(k,btn){
  const cur=S[k],next=cur==='n'?'d':cur==='d'?'p':'n';S[k]=next;
  btn.className='cbtn'+(next==='d'?' done':next==='p'?' pend':'');
  btn.textContent=next==='d'?'✓':next==='p'?'…':'';
  if(next==='d'){btn.classList.add('pop');btn.addEventListener('animationend',()=>btn.classList.remove('pop'),{once:true});}
  toast(next==='d'?'✅ Đã hoàn thành!':next==='p'?'⏳ Đang chờ xác nhận':'↩️ Đã bỏ chọn');
  /* update pending badge in row */
  const itemEl=document.getElementById('item_'+k);
  if(itemEl){const pb=itemEl.querySelector('.pb');if(pb)pb.remove();if(next==='p'){const nb=document.createElement('span');nb.className='pb';nb.textContent='⏳ Chờ';itemEl.querySelector('.ibody').appendChild(nb);}}

  const[sid,gi_s]=k.split('_');const si=D.findIndex(s=>s.id===sid);
  const sec=D[si];const gi=+gi_s;
  const gr=gR(sec,gi),gc=Math.min(gr,sec.groups[gi].max),gAt=gr>=sec.groups[gi].max;
  const rawSum=sR(sec),secAt=rawSum>=sec.max;

  sec.groups.forEach((g,gii)=>g.items.forEach((_,iii)=>{
    const ik=`${sid}_${gii}_${iii}`,ist=S[ik];
    const lk=(gR(sec,gii)>=g.max||secAt)&&ist!=='d'&&ist!=='p';
    const el=document.getElementById('item_'+ik);if(el)el.classList.toggle('lk',lk);
  }));

  const ge=document.getElementById(`grp_${sid}_${gi}`);
  if(ge){
    const pf=ge.querySelector('.prog-f');if(pf)pf.style.width=(sec.groups[gi].max?Math.round(gc/sec.groups[gi].max*100):0)+'%';
    const ct=ge.querySelector('.grp-ct');if(ct){ct.textContent=`${gc}/${sec.groups[gi].max}`;ct.className='grp-ct'+(gAt?' full':'');}
    ge.classList.toggle('capped',gAt);
  }

  const scv=sC(sec),over=sR(sec)>sec.max;
  const se=document.getElementById('sec_'+sid);
  const bd=se?.querySelector('.sec-bdg');if(bd){bd.textContent=`${scv}/${sec.max}`;bd.className='sec-bdg'+(scv===sec.max?' full':'');}
  const cp=se?.querySelector('.cap-pill');
  if(over&&!cp&&se){const r=se.querySelector('.sec-rt');if(r){const p=document.createElement('span');p.className='cap-pill';p.textContent='Vượt hạn';r.insertBefore(p,r.querySelector('.chev'));}}
  else if(!over&&cp)cp.remove();

  updHdr();
  const sbi=document.querySelector(`#sbar .sbi:nth-child(${si+1})`);
  if(sbi){sbi.querySelector('.sbi-v').textContent=scv;const sb=sbi.querySelector('.sbi-bar');if(sb)sb.style.width=Math.round(scv/sec.max*100)+'%';}
  const tab=document.querySelector(`#tabs .tab:nth-child(${si+1})`);
  if(tab){const ts=tab.querySelector('.ts');if(ts)ts.textContent=`${scv}/${sec.max}`;const ti=tab.querySelector('.ti');if(ti)ti.className='ti'+(scv===sec.max?' act':'');}
  save();
}

function tog(id){
  open[id]=!open[id];
  document.querySelector(`#sec_${id} .sec-body`).className='sec-body'+(open[id]?' o':'');
  document.querySelector(`#sec_${id} .chev`).className='chev'+(open[id]?' o':'');
}
function goSec(id){
  open[id]=true;
  document.querySelector(`#sec_${id} .sec-body`).className='sec-body o';
  document.querySelector(`#sec_${id} .chev`).className='chev o';
  const el=document.getElementById('sec_'+id);
  if(el)window.scrollTo({top:el.getBoundingClientRect().top+window.scrollY-130,behavior:'smooth'});
}

function clrQ(){document.getElementById('sq').value='';q='';document.getElementById('sq-x').className='sq-x';applyQ();}
document.getElementById('sq').addEventListener('input',function(){
  q=this.value.trim();document.getElementById('sq-x').className='sq-x'+(q?' on':'');applyQ();
});
function applyQ(){
  let hits=0;
  D.forEach(s=>{
    let sh=0;
    s.groups.forEach((g,gi)=>{
      let gh=0;
      g.items.forEach((it,ii)=>{
        const k=`${s.id}_${gi}_${ii}`,m=hit(it.l,q);if(m)gh++;
        const el=document.getElementById('item_'+k);
        if(el){el.classList.toggle('hide',!!(q&&!m));const lb=el.querySelector('.ilbl');if(lb)lb.innerHTML=q?hl(it.l,q):it.l;}
      });
      sh+=gh;hits+=gh;
      const ge=document.getElementById(`grp_${s.id}_${gi}`);if(ge)ge.classList.toggle('hide',!!(q&&gh===0));
    });
    const se=document.getElementById('sec_'+s.id);
    if(se){
      se.classList.toggle('hide',!!(q&&sh===0));
      if(q&&sh>0){open[s.id]=true;se.querySelector('.sec-body').className='sec-body o';se.querySelector('.chev').className='chev o';}
    }
  });
  const si=document.getElementById('sinfo'),nr=document.getElementById('no-r'),sc=document.getElementById('sum-card');
  if(q){si.className='sinfo on';si.innerHTML=`🔍 "<b>${q}</b>" — ${hits} kết quả`;nr.className='no-r'+(hits===0?' on':'');sc.style.display='none';}
  else{si.className='sinfo';nr.className='no-r';sc.style.display='';}
}

function openSup(){document.getElementById('overlay').className='overlay on'}
function closeSup(){document.getElementById('overlay').className='overlay'}
function copyBank(){
  const n='0398742380';
  navigator.clipboard?.writeText(n).catch(()=>{const t=document.createElement('textarea');t.value=n;document.body.appendChild(t);t.select();document.execCommand('copy');t.remove();});
  const b=document.getElementById('cp-btn');b.className='cp-btn ok';b.textContent='✓ Đã sao chép!';
  toast('📋 Đã sao chép số tài khoản!');
  setTimeout(()=>{b.className='cp-btn';b.textContent='📋 Sao chép';},2200);
}

function render(){
  document.getElementById('sbar').innerHTML=D.map(s=>{
    const v=sC(s),p=Math.round(v/s.max*100);
    return `<div class="sbi" onclick="goSec('${s.id}')"><div class="sbi-l">${s.id}</div><div class="sbi-v">${v}</div><div class="sbi-m">/${s.max}</div><div class="sbi-bar" style="width:${p}%"></div></div>`;
  }).join('');

  document.getElementById('tabs').innerHTML=D.map(s=>{
    const v=sC(s);
    return `<button class="tab" onclick="goSec('${s.id}')"><div class="ti${v===s.max?' act':''}">${s.ico}</div><div class="tl">${s.short}</div><div class="ts">${v}/${s.max}</div></button>`;
  }).join('');

  document.getElementById('root').innerHTML=D.map(s=>{
    const sc=sC(s),raw=sR(s),atCap=raw>=s.max,over=raw>s.max,isOpen=open[s.id];
    const ghtml=s.groups.map((g,gi)=>{
      const gr=gR(s,gi),gc=Math.min(gr,g.max),gAt=gr>=g.max,pct=g.max?Math.round(gc/g.max*100):0;
      const ihtml=g.items.map((it,ii)=>{
        const k=`${s.id}_${gi}_${ii}`,st=S[k],lk=(gAt||atCap)&&st!=='d'&&st!=='p';
        return `<div class="item${lk?' lk':''}" id="item_${k}" onclick="tickRow('${k}')">
          <div class="cbtn${st==='d'?' done':st==='p'?' pend':''}" id="cbtn_${k}">${st==='d'?'✓':st==='p'?'…':''}</div>
          <div class="ibody"><div class="ilbl">${it.l}</div><span class="pts">+${it.p} điểm</span>${st==='p'?'<span class="pb">⏳ Chờ</span>':''}</div>
        </div>`;
      }).join('');
      return `<div class="grp${gAt?' capped':''}" id="grp_${s.id}_${gi}">
        <div class="grp-hd"><div class="grp-nm">${g.name}</div><div class="grp-ct${gAt?' full':''}">${gc}/${g.max}</div></div>
        <div class="prog"><div class="prog-f" style="width:${pct}%"></div></div>
        ${ihtml}
        <div class="cap-msg">✅ Đã đạt tối đa nhóm — mục còn lại bị khoá</div>
      </div>`;
    }).join('');
    return `<div class="sec" id="sec_${s.id}">
      <div class="sec-hd" onclick="tog('${s.id}')">
        <div class="sec-ico">${s.ico}</div>
        <div class="sec-mid"><div class="sec-nm">${s.title}</div><div class="sec-mt">${s.groups.length} nhóm · tối đa ${s.max} điểm</div></div>
        <div class="sec-rt">
          <span class="sec-bdg${sc===s.max?' full':''}">${sc}/${s.max}</span>
          ${over?'<span class="cap-pill">Vượt hạn</span>':''}
          <span class="chev${isOpen?' o':''}">▼</span>
        </div>
      </div>
      <div class="sec-body${isOpen?' o':''}">${ghtml}</div>
    </div>`;
  }).join('');

  updHdr();
}
render();
</script>
